<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Insight | V3</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #151c2c;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --text: #f1f5f9;
            --border: #1e293b;
            --up: #10b981;
            --down: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.4rem; color: var(--accent); letter-spacing: 2px; margin: 0; }

        /* Arama Kutusu */
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: white; outline: none; }
        .search-btn { background: var(--accent); border: none; border-radius: 10px; padding: 0 20px; color: #0a0e1a; font-weight: bold; cursor: pointer; }

        /* Hava Durumu Kartı */
        .weather-card { background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .weather-temp { font-size: 3rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        
        /* Ekonomi Grid */
        .eco-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .eco-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
        .label { font-size: 0.65rem; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
        .value { font-size: 1.2rem; font-weight: bold; display: block; }
        .status { font-size: 0.65rem; font-weight: bold; margin-top: 8px; display: block; }

        /* Servis Butonları (Emojisiz) */
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .service-btn { background: #38bdf820; border: 1px solid var(--accent); color: var(--accent); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        /* Bitcoin Bölümü */
        .btc-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px; }

        .update-btn { width: 100%; background: var(--accent); color: #0a0e1a; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-bottom: 20px; }
        
        .news-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); font-size: 0.9rem; }
        .news-tag { background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GLOBAL INSIGHT</h1>
        <div style="font-size: 1.2rem;">🌙</div>
    </div>

    <div class="search-container">
        <input type="text" id="city-input" class="search-input" placeholder="Şehir girin..." value="BURDUR">
        <button class="search-btn" onclick="verileriGetir()">ARA</button>
    </div>

    <div class="weather-card">
        <div id="weather-desc">Parçalı Bulutlu</div>
        <div class="weather-temp" id="temp">24°C</div>
        <div style="font-weight: bold; letter-spacing: 1px;" id="city-name">BURDUR</div>
    </div>

    <div class="eco-grid">
        <div class="eco-card">
            <span class="label">USD/TRY</span>
            <span class="value" id="usd">--</span>
            <span class="status" id="usd-stat">STABİL</span>
        </div>
        <div class="eco-card">
            <span class="label">EUR/TRY</span>
            <span class="value" id="eur">--</span>
            <span class="status" id="eur-stat">DÜŞÜŞTE</span>
        </div>
        <div class="eco-card" style="border-color: var(--gold);">
            <span class="label" style="color: var(--gold);">GRAM ALTIN</span>
            <span class="value" id="gram">--</span>
            <span class="status" id="gram-stat">YÜKSELİYOR</span>
        </div>
        <div class="eco-card" style="border-color: var(--gold);">
            <span class="label" style="color: var(--gold);">ÇEYREK ALTIN</span>
            <span class="value" id="ceyrek">--</span>
            <span class="status" id="ceyrek-stat">HAREKETLİ</span>
        </div>
    </div>

    <div class="btc-card">
        <span class="label">BITCOIN</span>
        <span class="value" style="color: #10b981;" id="btc">--</span>
        <span class="status" id="btc-stat" style="color: #10b981;">▲ YÜKSELİYOR</span>
    </div>

    <div class="service-grid">
        <button class="service-btn" onclick="window.open('https://www.eczaneler.gen.tr/nobetci-' + document.getElementById('city-input').value.toLowerCase())">
            NÖBETÇİ ECZANELER
        </button>
        <button class="service-btn" onclick="window.open('https://www.petrolofisi.com.tr/akaryakit-fiyatlari')">
            YAKIT FİYATLARI
        </button>
    </div>

    <button class="update-btn" onclick="location.reload()">SİSTEMİ GÜNCELLE</button>

    <div id="news-feed"></div>
</div>

<script>
    async function verileriGetir() {
        try {
            const sehir = document.getElementById('city-input').value;
            document.getElementById('city-name').innerText = sehir.toUpperCase();

            // Ekonomi
            const ecoRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const ecoData = await ecoRes.json();
            const tryRate = ecoData.rates.TRY;
            document.getElementById('usd').innerText = tryRate.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = (tryRate / ecoData.rates.EUR).toFixed(2) + " ₺";

            // Altın & BTC
            const crypRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd');
            const crypData = await crypRes.json();
            const gramVal = (crypData['pax-gold'].usd / 31.1035) * tryRate;
            document.getElementById('gram').innerText = gramVal.toFixed(2) + " ₺";
            document.getElementById('ceyrek').innerText = (gramVal * 1.63).toFixed(0) + " ₺";
            document.getElementById('btc').innerText = "$" + crypData.bitcoin.usd.toLocaleString();

            // Durum Analizleri (Sadeleştirilmiş Mantık)
            document.getElementById('usd-stat').innerText = "● STABİL";
            document.getElementById('eur-stat').innerText = "▼ DÜŞÜŞTE"; document.getElementById('eur-stat').style.color = "#ef4444";
            document.getElementById('gram-stat').innerText = "▲ YÜKSELİYOR"; document.getElementById('gram-stat').style.color = "#10b981";
            document.getElementById('ceyrek-stat').innerText = "▲ HAREKETLİ"; document.getElementById('ceyrek-stat').style.color = "#10b981";

            // Hava Durumu
            const resW = await fetch(`https://api.wttr.in/${sehir}?format=j1`);
            const dataW = await resW.json();
            document.getElementById('temp').innerText = dataW.current_condition[0].temp_C + "°C";
            document.getElementById('weather-desc').innerText = dataW.current_condition[0].lang_tr[0].value;

            // Haberler
            const resS = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.sozcu.com.tr%2Ffeeds-son-dakika');
            const dS = await resS.json();
            let html = "";
            dS.items.slice(0, 5).forEach(i => {
                html += `<div class="news-item"><span class="news-tag">SÖZCÜ</span>${i.title}</div>`;
            });
            document.getElementById('news-feed').innerHTML = html;

        } catch (e) { console.log("Hata!"); }
    }

    window.onload = verileriGetir;
</script>

</body>
</html>
