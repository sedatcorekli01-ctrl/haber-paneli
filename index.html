<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Insight | Haber & Ekonomi</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 600px; width: 100%; }
        .header { text-align: center; padding: 25px 0; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
        #date-display { color: #64748b; font-family: monospace; font-size: 1rem; margin-top: 8px; }

        .eco-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .eco-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1e293b;
        }
        .eco-label { font-size: 0.75rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        .eco-val { display: block; font-size: 1.1rem; margin-top: 5px; font-weight: 700; color: #f8fafc; }
        .gold-text { color: var(--gold) !important; }

        .btn-update {
            width: 100%;
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .news-card {
            background: var(--card);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid #1e293b;
            transition: 0.2s;
        }
        .news-card:hover { border-color: var(--accent); }
        .news-title { font-size: 1.05rem; line-height: 1.5; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GLOBAL INSIGHT</h1>
        <div id="date-display">SİSTEM BAŞLATILIYOR...</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-label">USD/TRY</span><span id="usd" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">EUR/TRY</span><span id="eur" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">GRAM ALTIN</span><span id="gold-gram" class="eco-val gold-text">...</span></div>
        <div class="eco-item"><span class="eco-label">BITCOIN</span><span id="btc" class="eco-val">...</span></div>
    </div>

    <button class="btn-update" onclick="tümVerileriGuncelle()">Sistemi Güncelle</button>

    <div class="news-section">
        <div id="news-feed">Haberler hazırlanıyor...</div>
    </div>
</div>

<script>
    function saatiGuncelle() {
        const simdi = new Date();
        document.getElementById('date-display').innerText = simdi.toLocaleString('tr-TR');
    }

    async function tümVerileriGuncelle() {
        const newsFeed = document.getElementById('news-feed');
        newsFeed.innerHTML = "Haber akışı taranıyor...";
        
        try {
            const ecoRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const ecoData = await ecoRes.json();
            const tryRate = ecoData.rates.TRY;
            
            document.getElementById('usd').innerText = tryRate.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = (tryRate / ecoData.rates.EUR).toFixed(2) + " ₺";
            
            const goldRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd');
            const goldData = await goldRes.json();
            const gramGold = (goldData['pax-gold'].usd / 31.1035) * tryRate;
            document.getElementById('gold-gram').innerText = gramGold.toFixed(2) + " ₺";

            const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const btcData = await btcRes.json();
            document.getElementById('btc').innerText = "$" + btcData.bitcoin.usd.toLocaleString();
        } catch (e) { console.error("Finans hatası"); }

        try {
            // En hızlı ve takılmayan haber kaynağına geçtik (Ensonhaber)
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ensonhaber.com%2Frss%2Fensonhaber.xml`);
            const data = await res.json();
            if(data.status === 'ok') {
                newsFeed.innerHTML = "";
                data.items.slice(0, 15).forEach(item => {
                    newsFeed.innerHTML += `
                        <a href="${item.link}" target="_blank" class="news-card">
                            <div class="news-title">${item.title}</div>
                        </a>`;
                });
            }
        } catch (e) { newsFeed.innerHTML = "Haberler şu an yüklenemedi, butona tekrar basın."; }
    }

    window.onload = () => {
        tümVerileriGuncelle();
        setInterval(saatiGuncelle, 1000);
    };
</script>

</body>
</html>
