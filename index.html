<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Insight | Canlı Piyasa</title>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #38bdf8; --gold: #fbbf24; 
            --text: #f1f5f9; --border: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .search-box { display: flex; gap: 8px; margin: 20px 0; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; }
        .search-box button { padding: 12px 20px; border-radius: 10px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }

        .weather-section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--accent); text-align: center; }
        #weather-temp { font-size: 2.2rem; font-weight: 900; color: var(--accent); }

        .eco-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .eco-item { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .eco-label { font-size: 0.7rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .eco-val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        
        .status-note { font-size: 0.65rem; margin-top: 8px; font-weight: 700; display: block; }
        .up { color: #10b981; }   /* Yeşil - Yükseliş */
        .down { color: #ef4444; } /* Kırmızı - Düşüş */
        .stable { color: #94a3b8; } /* Gri - Sabit */

        .btn-update { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="text" id="city-input" placeholder="Şehir girin...">
        <button onclick="havaDurumuGuncelle()">ARA</button>
    </div>

    <div class="weather-section">
        <div id="weather-info">Piyasa taranıyor...</div>
        <div id="weather-temp">--°C</div>
        <div id="weather-city">BURDUR</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item">
            <span class="eco-label">USD/TRY</span>
            <span id="usd" class="eco-val">...</span>
            <span id="usd-note" class="status-note">YÜKLENİYOR</span>
        </div>
        <div class="eco-item">
            <span class="eco-label">EUR/TRY</span>
            <span id="eur" class="eco-val">...</span>
            <span id="eur-note" class="status-note">YÜKLENİYOR</span>
        </div>
        <div class="eco-item" style="border: 1px solid var(--gold);">
            <span class="eco-label" style="color:var(--gold)">Gram Altın</span>
            <span id="gold-gram" class="eco-val" style="color:var(--gold)">...</span>
            <span id="gold-note" class="status-note">YÜKLENİYOR</span>
        </div>
        <div class="eco-item">
            <span class="eco-label">Bitcoin</span>
            <span id="btc" class="eco-val">...</span>
            <span id="btc-note" class="status-note">YÜKLENİYOR</span>
        </div>
    </div>

    <button class="btn-update" onclick="location.reload()">SİSTEMİ TAZELE</button>
</div>

<script>
    async function piyasaVerileriniCek() {
        try {
            // Döviz Kurları (Güncel Fiyatlar)
            const exchangeRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const exchangeData = await exchangeRes.json();
            const usdTry = exchangeData.rates.TRY;
            const eurTry = (usdTry / exchangeData.rates.EUR).toFixed(2);
            
            document.getElementById('usd').innerText = usdTry.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = eurTry + " ₺";

            // Değişim Oranları İçin CoinGecko (Tether ve Euro Coin üzerinden piyasa yönü analizi)
            const coinRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold,tether,stasis-eurs&vs_currencies=usd&include_24hr_change=true');
            const coinData = await coinRes.json();

            // 1. Bitcoin Analizi
            document.getElementById('btc').innerText = "$" + coinData.bitcoin.usd.toLocaleString();
            updateUI('btc-note', coinData.bitcoin.usd_24h_change, "Kripto Yükselişte", "Kripto Düşüşte");

            // 2. Altın Analizi
            const gramAltin = (coinData['pax-gold'].usd / 31.1035) * usdTry;
            document.getElementById('gold-gram').innerText = gramAltin.toFixed(2) + " ₺";
            updateUI('gold-note', coinData['pax-gold'].usd_24h_change, "Altın Değerleniyor", "Altın Düşüşte");

            // 3. Dolar Yön Analizi (USDT/USD sapmasına ve genel TRY trendine göre)
            // Not: TRY verisi API'lerde gecikmeli geldiğinden, piyasa oynaklığını USDT üzerinden simüle ediyoruz.
            updateUI('usd-note', coinData.tether.usd_24h_change + 0.02, "Dolar Yükseliyor", "Dolar Düşüşte");

            // 4. Euro Yön Analizi
            updateUI('eur-note', coinData['stasis-eurs'].usd_24h_change, "Euro Hareketli", "Euro Düşüşte");

            await havaDurumuGuncelle();
        } catch (e) {
            console.error("Piyasa verisi alınamadı.");
        }
    }

    function updateUI(elementId, change, upText, downText) {
        const el = document.getElementById(elementId);
        // Hassasiyet eşiği: 0.01 (Çok küçük hareketleri 'Stabil' sayar)
        if (change > 0.01) {
            el.innerText = "▲ " + upText;
            el.className = "status-note up";
        } else if (change < -0.01) {
            el.innerText = "▼ " + downText;
            el.className = "status-note down";
        } else {
            el.innerText = "● PİYASA STABİL";
            el.className = "status-note stable";
        }
    }

    async function havaDurumuGuncelle() {
        const city = document.getElementById('city-input').value || "Burdur";
        try {
            const res = await fetch(`https://api.wttr.in/${city}?format=j1`);
            const data = await res.json();
            document.getElementById('weather-temp').innerText = data.current_condition[0].temp_C + "°C";
            document.getElementById('weather-info').innerText = data.current_condition[0].lang_tr[0].value;
            document.getElementById('weather-city').innerText = city.toUpperCase();
        } catch (e) {}
    }

    window.onload = piyasaVerileriniCek;
</script>
</body>
</html>
