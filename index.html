<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Insight | App</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 600px; width: 100%; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        #date-display { color: #64748b; font-size: 1rem; margin-top: 5px; }

        .eco-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0;
        }
        .eco-item {
            background: var(--card); padding: 15px; border-radius: 12px;
            text-align: center; border: 1px solid #1e293b;
        }
        .eco-label { font-size: 0.7rem; color: #94a3b8; font-weight: bold; }
        .eco-val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .gold-text { color: var(--gold); }

        .btn-update {
            width: 100%; background: var(--accent); color: #020617;
            border: none; padding: 18px; border-radius: 12px;
            font-weight: 800; cursor: pointer; margin-bottom: 25px;
        }

        .news-card {
            background: var(--card); padding: 15px; border-radius: 12px;
            margin-bottom: 10px; display: block; text-decoration: none;
            color: inherit; border: 1px solid #1e293b;
        }
        .news-title { font-size: 0.95rem; line-height: 1.4; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GLOBAL INSIGHT</h1>
        <div id="date-display">...</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-label">USD/TRY</span><span id="usd" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">EUR/TRY</span><span id="eur" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">GRAM ALTIN</span><span id="gold-gram" class="eco-val gold-text">...</span></div>
        <div class="eco-item"><span class="eco-label">BITCOIN</span><span id="btc" class="eco-val">...</span></div>
    </div>

    <button class="btn-update" onclick="location.reload()">SİSTEMİ GÜNCELLE</button>

    <div id="news-feed">Haberler taranıyor...</div>
</div>

<script>
    function saatiGuncelle() {
        document.getElementById('date-display').innerText = new Date().toLocaleString('tr-TR');
    }

    async function verileriGetir() {
        const newsFeed = document.getElementById('news-feed');
        try {
            const ecoRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const ecoData = await ecoRes.json();
            const tryRate = ecoData.rates.TRY;
            document.getElementById('usd').innerText = tryRate.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = (tryRate / ecoData.rates.EUR).toFixed(2) + " ₺";
            
            const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd');
            const btcData = await btcRes.json();
            document.getElementById('gold-gram').innerText = ((btcData['pax-gold'].usd / 31.1035) * tryRate).toFixed(2) + " ₺";
            document.getElementById('btc').innerText = "$" + btcData.bitcoin.usd.toLocaleString();
        } catch (e) { console.log("Hata"); }

        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ntv.com.tr%2Fson-dakika.rss');
            const data = await res.json();
            if(data.status === 'ok') {
                newsFeed.innerHTML = "";
                const basliklar = new Set(); // Aynı haberleri engellemek için set kullanıyoruz
                
                data.items.forEach(item => {
                    // Eğer başlık daha önce eklenmediyse ve 15 habere ulaşmadıysak ekle
                    if(!basliklar.has(item.title) && basliklar.size < 15) {
                        basliklar.add(item.title);
                        newsFeed.innerHTML += `<a href="${item.link}" target="_blank" class="news-card"><div class="news-title">${item.title}</div></a>`;
                    }
                });
            }
        } catch (e) { newsFeed.innerHTML = "Şu an haber çekilemiyor."; }
    }

    window.onload = () => {
        verileriGetir();
        setInterval(saatiGuncelle, 1000);
    };
</script>

</body>
</html>
