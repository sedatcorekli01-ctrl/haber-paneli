<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Canlı ekonomi ve haber takip paneli.">
    <title>Master Panel | Pro</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 600px; width: 100%; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { margin: 0; font-size: 1.8rem; color: var(--accent); }
        #date-display { color: #94a3b8; font-family: monospace; font-size: 1.1rem; margin-top: 10px; }

        .eco-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .eco-item {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .eco-label { font-size: 0.7rem; color: var(--accent); font-weight: bold; }
        .eco-val { display: block; font-size: 1rem; margin-top: 5px; font-weight: bold; }

        .news-section h2 { font-size: 1.2rem; border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; }
        .news-card {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .news-card:hover { border-color: var(--accent); background: #334155; }
        .news-title { font-size: 1rem; line-height: 1.4; }

        .btn-update {
            width: 100%;
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MERKEZİ PANEL</h1>
        <div id="date-display">Yükleniyor...</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-label">DOLAR</span><span id="usd" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">EURO</span><span id="eur" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">BITCOIN</span><span id="btc" class="eco-val">...</span></div>
    </div>

    <button class="btn-update" onclick="tümVerileriGuncelle()">VERİLERİ TAZELE</button>

    <div class="news-section">
        <h2>Son Dakika Haberler</h2>
        <div id="news-feed">Haberler getiriliyor...</div>
    </div>
</div>

<script>
    // 1. Saniyelerin akması için fonksiyon
    function saatiGuncelle() {
        const simdi = new Date();
        document.getElementById('date-display').innerText = simdi.toLocaleString('tr-TR');
    }

    // 2. Ekonomi ve Haberleri çeken fonksiyon
    async function tümVerileriGuncelle() {
        const newsFeed = document.getElementById('news-feed');
        
        // Ekonomi
        try {
            const ecoRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const ecoData = await ecoRes.json();
            document.getElementById('usd').innerText = ecoData.rates.TRY.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = (ecoData.rates.TRY / ecoData.rates.EUR).toFixed(2) + " ₺";
            
            const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const btcData = await btcRes.json();
            document.getElementById('btc').innerText = "$" + btcData.bitcoin.usd.toLocaleString();
        } catch (e) { console.error("Veri hatası"); }

        // Haberler (TRT Haber RSS)
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.trthaber.com%2Fmanset_articles.rss`);
            const data = await res.json();
            
            if(data.status === 'ok') {
                newsFeed.innerHTML = "";
                data.items.slice(0, 10).forEach(item => {
                    newsFeed.innerHTML += `
                        <a href="${item.link}" target="_blank" class="news-card">
                            <div class="news-title">${item.title}</div>
                        </a>
                    `;
                });
            }
        } catch (e) { newsFeed.innerHTML = "Haber akışı şu an meşgul."; }
    }

    // Sayfa açıldığında her şeyi başlat
    window.onload = () => {
        tümVerileriGuncelle();
        setInterval(saatiGuncelle, 1000); // Saniyeyi her saniye yürüt
    };
</script>

</body>
</html>
