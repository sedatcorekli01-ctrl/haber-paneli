<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Insight | App</title>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #38bdf8; --gold: #fbbf24; 
            --text: #f1f5f9; --sozcu: #e11d48; --karma: #6366f1; --border: #1e293b;
        }
        .light-mode {
            --bg: #f8fafc; --card: #ffffff; --accent: #0284c7; --gold: #b45309; 
            --text: #0f172a; --border: #e2e8f0;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        .container { max-width: 600px; margin: 0 auto; width: 100%; }
        
        .mode-toggle { position: fixed; top: 15px; right: 15px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 8px 12px; border-radius: 50%; cursor: pointer; z-index: 100; font-size: 1.2rem; }
        
        .header { text-align: center; padding: 15px 0; margin-top: 20px; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Hava Durumu Bölümü */
        .weather-section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--accent); text-align: center; }
        #weather-temp { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        #city-select { 
            background: var(--bg); color: var(--text); border: 1px solid var(--border); 
            padding: 8px 15px; border-radius: 8px; font-size: 1rem; cursor: pointer; outline: none; margin-bottom: 10px;
        }

        .eco-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .eco-item { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .eco-label { font-size: 0.7rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .eco-val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .gold-text { color: var(--gold); }
        
        .btn-update { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-bottom: 25px; transition: 0.2s; }
        .btn-update:active { transform: scale(0.98); opacity: 0.9; }
        
        .news-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: block; text-decoration: none; color: inherit; border: 1px solid var(--border); transition: 0.2s; }
        .news-card:hover { border-color: var(--accent); }
        .news-title { font-size: 0.95rem; line-height: 1.4; font-weight: 500; }
        .tag { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; display: inline-block; padding: 2px 8px; border-radius: 4px; }
        .tag-sozcu { background: var(--sozcu); color: white; }
        .tag-karma { background: var(--karma); color: white; }
    </style>
</head>
<body>

<button class="mode-toggle" onclick="temaDegistir()" id="theme-btn">☀️</button>

<div class="container">
    <div class="header"><h1>GLOBAL INSIGHT</h1></div>

    <div class="weather-section">
        <select id="city-select" onchange="verileriGetir()">
            <option value="Burdur">Burdur</option>
            <option value="Istanbul">İstanbul</option>
            <option value="Ankara">Ankara</option>
            <option value="Izmir">İzmir</option>
            <option value="Antalya">Antalya</option>
            <option value="Bursa">Bursa</option>
            <option value="Adana">Adana</option>
            <option value="Trabzon">Trabzon</option>
        </select>
        <div id="weather-info">Hava durumu yükleniyor...</div>
        <div id="weather-temp">--°C</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-label">USD/TRY</span><span id="usd" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">EUR/TRY</span><span id="eur" class="eco-val">...</span></div>
        <div class="eco-item" style="border: 1px solid var(--gold);"><span class="eco-label gold-text">Çeyrek Altın</span><span id="q-gold" class="eco-val gold-text">...</span></div>
        <div class="eco-item"><span class="eco-label">Gram Altın</span><span id="gold-gram" class="eco-val">...</span></div>
        <div class="eco-item" style="grid-column: span 2;"><span class="eco-label">Bitcoin</span><span id="btc" class="eco-val" style="color:#10b981">...</span></div>
    </div>

    <button class="btn-update" onclick="verileriGetir()">VERİLERİ TAZELE</button>

    <div id="news-feed">Haberler hazırlanıyor...</div>
</div>

<script>
    function temaDegistir() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('light-mode');
        btn.innerText = body.classList.contains('light-mode') ? "🌙" : "☀️";
    }

    async function verileriGetir() {
        const city = document.getElementById('city-select').value;
        
        try {
            // 1. Ekonomi Verileri (Döviz)
            const ecoRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const ecoData = await ecoRes.json();
            const tryRate = ecoData.rates.TRY;
            document.getElementById('usd').innerText = tryRate.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = (tryRate / ecoData.rates.EUR).toFixed(2) + " ₺";
            
            // 2. Kripto ve Altın (CoinGecko PAXG üzerinden Gram Altın hesaplama)
            const crypRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd');
            const crypData = await crypRes.json();
            const gramAltin = (crypData['pax-gold'].usd / 31.1035) * tryRate;
            document.getElementById('gold-gram').innerText = gramAltin.toFixed(2) + " ₺";
            document.getElementById('q-gold').innerText = (gramAltin * 1.63).toFixed(0) + " ₺";
            document.getElementById('btc').innerText = "$" + crypData.bitcoin.usd.toLocaleString();

            // 3. Hava Durumu (wttr.in dinamik şehir)
            const resWeather = await fetch(`https://api.wttr.in/${city}?format=j1`);
            const dataWeather = await resWeather.json();
            document.getElementById('weather-temp').innerText = dataWeather.current_condition[0].temp_C + "°C";
            const weatherDesc = dataWeather.current_condition[0].lang_tr 
                ? dataWeather.current_condition[0].lang_tr[0].value 
                : dataWeather.current_condition[0].weatherDesc[0].value;
            document.getElementById('weather-info').innerText = weatherDesc.toUpperCase();

            // 4. Haberler (Karma Liste)
            const newsFeed = document.getElementById('news-feed');
            const resSozcu = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.sozcu.com.tr%2Ffeeds-son-dakika');
            const dataSozcu = await resSozcu.json();
            const resHT = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.haberturk.com%2Frss%2Fmanset.xml');
            const dataHT = await resHT.json();

            let htmlContent = "";
            if(dataSozcu.status === 'ok') {
                dataSozcu.items.slice(0, 8).forEach(item => {
                    htmlContent += `<a href="${item.link}" target="_blank" class="news-card"><span class="tag tag-sozcu">SÖZCÜ</span><div class="news-title">${item.title}</div></a>`;
                });
            }
            if(dataHT.status === 'ok') {
                dataHT.items.slice(0, 8).forEach(item => {
                    htmlContent += `<a href="${item.link}" target="_blank" class="news-card"><span class="tag tag-karma">HABERTÜRK</span><div class="news-title">${item.title}</div></a>`;
                });
            }
            newsFeed.innerHTML = htmlContent;

        } catch (e) { 
            console.error("Veri çekme hatası:", e);
            document.getElementById('weather-info').innerText = "Bağlantı Hatası!";
        }
    }

    // Uygulama açıldığında verileri çek
    window.onload = verileriGetir;
</script>
</body>
    </html>
