<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Insight | App</title>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #38bdf8; --gold: #fbbf24; 
            --text: #f1f5f9; --sozcu: #e11d48; --karma: #6366f1; --border: #1e293b; --meat: #fb7185;
        }
        .light-mode {
            --bg: #f8fafc; --card: #ffffff; --accent: #0284c7; --gold: #b45309; 
            --text: #0f172a; --border: #e2e8f0; --meat: #e11d48;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .container { max-width: 600px; width: 100%; }
        .mode-toggle { position: fixed; top: 15px; right: 15px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 8px 12px; border-radius: 50%; cursor: pointer; z-index: 100; font-size: 1.2rem; }
        .header { text-align: center; padding: 15px 0; margin-top: 20px; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .weather-section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--accent); text-align: center; }
        .weather-search { display: flex; gap: 8px; margin-bottom: 15px; }
        .weather-search input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        .weather-search button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; color: white; }
        #weather-temp { font-size: 2.2rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .eco-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .eco-item { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .eco-label { font-size: 0.7rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .eco-val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .gold-text { color: var(--gold); }
        .meat-text { color: var(--meat); }
        .btn-update { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-bottom: 25px; }
        .news-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: block; text-decoration: none; color: inherit; border: 1px solid var(--border); }
        .tag { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; display: inline-block; padding: 2px 8px; border-radius: 4px; }
        .tag-sozcu { background: var(--sozcu); color: white; }
        .tag-karma { background: var(--karma); color: white; }
    </style>
</head>
<body>

<button class="mode-toggle" onclick="temaDegistir()" id="theme-btn">☀️</button>

<div class="container">
    <div class="header"><h1>GLOBAL INSIGHT</h1></div>

    <div class="weather-section">
        <div class="weather-search"><input type="text" id="city-input" placeholder="Şehir yazın..."><button onclick="havaDurumuAra()">ARA</button></div>
        <div id="weather-info">Hava durumu yükleniyor...</div>
        <div id="weather-temp">--°C</div>
        <div id="weather-city">BURDUR</div>
    </div>

    <div class="eco-grid">
        <div class="eco-item"><span class="eco-label">Dolar/TL</span><span id="usd" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">Euro/TL</span><span id="eur" class="eco-val">...</span></div>
        <div class="eco-item" style="border: 1px solid var(--gold);"><span class="eco-label gold-text">Çeyrek Altın</span><span id="q-gold" class="eco-val gold-text">...</span></div>
        <div class="eco-item"><span class="eco-label">Gram Altın</span><span id="gold-gram" class="eco-val">...</span></div>
        <div class="eco-item"><span class="eco-label">Dana Karkas (kg)</span><span id="beef" class="eco-val meat-text">...</span></div>
        <div class="eco-item"><span class="eco-label">Kuzu Karkas (kg)</span><span id="lamb" class="eco-val meat-text">...</span></div>
    </div>

    <button class="btn-update" onclick="location.reload()">SİSTEMİ GÜNCELLE</button>
    <div id="news-feed">Haberler hazırlanıyor...</div>
</div>

<script>
    function temaDegistir() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('light-mode');
        btn.innerText = body.classList.contains('light-mode') ? "🌙" : "☀️";
    }

    async function havaDurumuGetir(sehir = 'Burdur') {
        try {
            const res = await fetch(`https://api.wttr.in/${sehir}?format=j1`);
            const data = await res.json();
            const current = data.current_condition[0];
            document.getElementById('weather-temp').innerText = current.temp_C + "°C";
            document.getElementById('weather-info').innerText = current.lang_tr ? current.lang_tr[0].value : current.weatherDesc[0].value;
            document.getElementById('weather-city').innerText = sehir.toUpperCase();
        } catch (e) {}
    }

    function havaDurumuAra() {
        const input = document.getElementById('city-input').value;
        if(input) havaDurumuGetir(input);
    }

    async function verileriGetir() {
        try {
            const ecoRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const ecoData = await ecoRes.json();
            const tryRate = ecoData.rates.TRY;
            document.getElementById('usd').innerText = tryRate.toFixed(2) + " ₺";
            document.getElementById('eur').innerText = (tryRate / ecoData.rates.EUR).toFixed(2) + " ₺";
            
            const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd');
            const btcData = await btcRes.json();
            const gramAltin = (btcData['pax-gold'].usd / 31.1035) * tryRate;
            document.getElementById('gold-gram').innerText = gramAltin.toFixed(2) + " ₺";
            // Anneanne için Çeyrek Altın (Gram x 1.75 yaklaşık hesap)
            document.getElementById('q-gold').innerText = (gramAltin * 1.63).toFixed(0) + " ₺";
            
            // Dede için Karkas Et (Tahmini borsa verisi)
            // Not: Bu veriler anlık borsadan gelmediği için piyasa ortalaması üzerinden simüle edilmiştir.
            document.getElementById('beef').innerText = "385.50 ₺";
            document.getElementById('lamb').innerText = "415.20 ₺";
            
        } catch (e) {}

        try {
            const newsFeed = document.getElementById('news-feed');
            const resSozcu = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.sozcu.com.tr%2Ffeeds-son-dakika');
            const dataSozcu = await resSozcu.json();
            const resShow = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.haberturk.com%2Frss%2Fmanset.xml');
            const dataShow = await resShow.json();
            let htmlContent = "";
            if(dataSozcu.status === 'ok') dataSozcu.items.slice(0, 10).forEach(item => {
                htmlContent += `<a href="${item.link}" target="_blank" class="news-card"><span class="tag tag-sozcu">SÖZCÜ</span><div class="news-title">${item.title}</div></a>`;
            });
            if(dataShow.status === 'ok') dataShow.items.slice(0, 10).forEach(item => {
                htmlContent += `<a href="${item.link}" target="_blank" class="news-card"><span class="tag tag-karma">SON DAKİKA</span><div class="news-title">${item.title}</div></a>`;
            });
            newsFeed.innerHTML = htmlContent;
        } catch (e) {}
    }

    window.onload = () => { havaDurumuGetir(); verileriGetir(); };
</script>

</body>
</html>
